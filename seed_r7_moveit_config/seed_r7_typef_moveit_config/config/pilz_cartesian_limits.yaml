# Pilz Industrial Motion Planner — Cartesian limits for typeF
# NOTE: do NOT wrap with robot_description_planning: — MoveItConfigsBuilder adds it automatically
cartesian_limits:
  max_trans_vel: 1.0       # [m/s]
  max_trans_acc: 2.25      # [m/s^2]
  max_trans_dec: -5.0      # [m/s^2]  (negative = deceleration)
  max_rot_vel: 1.57        # [rad/s]
